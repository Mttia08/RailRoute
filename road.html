<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Fahrzeit Rechner</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border-radius: 8px;
            font-family: Arial;
        }
    </style>
</head>
<body>

<div id="info">Klicke zwei Punkte auf die Karte</div>
<div id="map"></div>

<script>
const map = L.map('map').setView([46.8, 8.3], 8);

// OpenStreetMap Tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let points = [];
let markers = [];
let routeLayer = null;

map.on('click', async (e) => {

    if (points.length >= 2) {
        // reset
        points = [];
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        if (routeLayer) map.removeLayer(routeLayer);
    }

    points.push([e.latlng.lng, e.latlng.lat]);

    const marker = L.marker(e.latlng).addTo(map);
    markers.push(marker);

    if (points.length === 2) {
        const url = `https://router.project-osrm.org/route/v1/driving/` +
                    `${points[0][0]},${points[0][1]};` +
                    `${points[1][0]},${points[1][1]}?overview=full&geometries=geojson`;

        const res = await fetch(url);
        const data = await res.json();

        const route = data.routes[0];

        // Fahrzeit in Sekunden (exakt)
        const duration = route.duration;

        document.getElementById("info").innerHTML =
            "Fahrzeit: " + Math.floor(duration/60) + ":" + (duration % 60).toFixed(0) + " (" + Math.floor((duration* 1.2)/60) + ":" + ((duration* 1.2) % 60).toFixed(0) + ")"

        // Route anzeigen
        routeLayer = L.geoJSON(route.geometry).addTo(map);

        map.fitBounds(routeLayer.getBounds());
    }
});
</script>

</body>
</html>
